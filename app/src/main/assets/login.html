<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimeKeeper · Admin login</title>
  <style>
    :root { --bg:#0b1020; --panel:#181f3a; --panel-2:#2a3357; --text:#f1f5f9; --muted:#9aa6c4; --blue:#3b82f6; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; }
    body {
      font-family:-apple-system,"Roboto",sans-serif; background:radial-gradient(900px 520px at 12% -8%,rgba(99,102,241,.30),transparent 60%),radial-gradient(820px 520px at 108% 4%,rgba(168,85,247,.20),transparent 55%),var(--bg); background-attachment:fixed; color:var(--text);
      display:flex; align-items:center; justify-content:center; min-height:100vh;
    }
    .card { background:linear-gradient(160deg,rgba(30,38,72,.95),rgba(18,24,50,.95)); border:1px solid rgba(148,163,247,.15); border-radius:20px; padding:2rem; width:min(90vw,340px); text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.45); }
    h1 { margin:0 0 .25rem; font-size:1.4rem; font-weight:800; background:linear-gradient(135deg,#818cf8,#c084fc); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .byline { color:var(--muted); font-size:.85rem; margin-bottom:1.25rem; }
    input {
      width:100%; background:var(--bg); border:1px solid var(--panel-2); color:var(--text);
      padding:.75rem; border-radius:10px; font-size:1.4rem; text-align:center; margin-bottom:1rem;
    }
    button {
      width:100%; border:none; border-radius:10px; background:linear-gradient(135deg,#6366f1,#a855f7); color:#fff; box-shadow:0 6px 18px rgba(99,102,241,.35);
      padding:.8rem; font-size:1rem; font-weight:600; cursor:pointer;
    }
    .err { color:#fca5a5; margin-top:.75rem; min-height:1.2em; }
    a { color:var(--muted); font-size:.85rem; display:inline-block; margin-top:1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin</h1>
    <div class="byline">TimeKeeper by Ali Ismail</div>
    <input id="pin" type="password" inputmode="numeric" placeholder="PIN" autofocus>
    <button id="go">Enter</button>
    <div class="err" id="err"></div>
    <a href="/">← Back to kiosk</a>
  </div>
  <script>
    function submit() {
      var pin = document.getElementById("pin").value;
      fetch("/admin/login?pin=" + encodeURIComponent(pin), { method: "POST" })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.ok) location.href = "/admin";
          else document.getElementById("err").textContent = "Incorrect PIN.";
        })
        .catch(function () { document.getElementById("err").textContent = "Something went wrong."; });
    }
    document.getElementById("go").addEventListener("click", submit);
    document.getElementById("pin").addEventListener("keydown", function (e) {
      if (e.key === "Enter") submit();
    });
  </script>
</body>
</html>
