<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>TimeKeeper</title>
  <style>
    :root {
      --bg:#0f172a; --panel:#1e293b; --panel-2:#334155; --text:#f1f5f9;
      --muted:#94a3b8; --green:#22c55e;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; height:100%; }
    body {
      font-family:-apple-system,"Roboto",sans-serif; background:var(--bg);
      color:var(--text); user-select:none; display:flex; flex-direction:column;
      height:100vh; overflow:hidden;
    }
    .topbar {
      display:flex; align-items:center; gap:1rem; padding:1rem 1.5rem;
      background:var(--panel); border-bottom:1px solid var(--panel-2);
    }
    .brand { font-weight:700; font-size:1.5rem; letter-spacing:.3px; }
    .byline { font-weight:400; color:var(--muted); font-size:.62em; }
    .topright { margin-left:auto; text-align:right; line-height:1.2; }
    .clock { font-size:1.6rem; font-weight:600; font-variant-numeric:tabular-nums; }
    .date { color:var(--muted); font-size:.9rem; }
    main { flex:1; padding:1.5rem; overflow-y:auto; }
    .prompt { text-align:center; font-size:1.6rem; font-weight:600; margin:.25rem 0 1.5rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1.25rem; }
    .namecard {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:.6rem; min-height:150px; border-radius:16px; background:var(--panel);
      padding:1.25rem; border:2px solid transparent; cursor:pointer;
      transition:transform .08s ease;
    }
    .namecard:active { transform:scale(.97); }
    .namecard-name { font-size:1.6rem; font-weight:700; text-align:center; }
    .namecard-status { font-size:1rem; color:var(--muted); }
    .namecard.is-in { border-color:var(--green); }
    .namecard.is-in .namecard-status { color:var(--green); }
    .namecard.is-out { border-color:var(--panel-2); }
    .empty { text-align:center; color:var(--muted); font-size:1.1rem; margin-top:2rem; }
    .footer { text-align:center; color:var(--muted); font-size:.8rem; padding:.5rem; }
    /* result overlay */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
      align-items:center; justify-content:center; z-index:50;
    }
    .overlay.show { display:flex; }
    .sheet {
      background:var(--panel); border-radius:24px; padding:2.5rem 2rem;
      width:min(90vw,460px); text-align:center;
    }
    .sheet .mark {
      font-size:3.5rem; width:96px; height:96px; line-height:96px;
      border-radius:50%; margin:0 auto 1rem;
    }
    .sheet.ok .mark { color:var(--green); background:rgba(34,197,94,.15); }
    .sheet.err .mark { color:#fca5a5; background:rgba(239,68,68,.15); }
    .sheet .msg { font-size:1.35rem; font-weight:600; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">TimeKeeper <span class="byline">by Ali Ismail</span></span>
    <div class="topright">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date"></div>
    </div>
  </div>

  <main>
    <p class="prompt">Tap your name to clock in or out</p>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" hidden>No workers yet.</p>
  </main>

  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet">
      <div class="mark" id="mark"></div>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div class="footer" id="footer">Runs entirely on the tablet.</div>

  <script>
    function tick() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var ap = h >= 12 ? "PM" : "AM"; var hr = h % 12 || 12;
      document.getElementById("clock").textContent =
        hr + ":" + (m < 10 ? "0" + m : m) + " " + ap;
      document.getElementById("date").textContent =
        now.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });
    }
    tick(); setInterval(tick, 1000);

    function renderWorkers(list) {
      var grid = document.getElementById("grid");
      grid.innerHTML = "";
      document.getElementById("empty").hidden = list.length > 0;
      list.forEach(function (w) {
        var card = document.createElement("div");
        card.className = "namecard " + (w.in ? "is-in" : "is-out");
        card.innerHTML = '<div class="namecard-name"></div><div class="namecard-status"></div>';
        card.querySelector(".namecard-name").textContent = w.name;
        card.querySelector(".namecard-status").textContent = w.in ? "In" : "Out";
        card.addEventListener("click", function () { clock(w.id); });
        grid.appendChild(card);
      });
    }

    function loadWorkers() {
      fetch("/api/workers")
        .then(function (r) { return r.json(); })
        .then(renderWorkers)
        .catch(function () {
          var em = document.getElementById("empty");
          em.hidden = false; em.textContent = "Could not reach the server.";
        });
    }

    function clock(id) {
      fetch("/api/clock?id=" + id, { method: "POST" })
        .then(function (r) { return r.json(); })
        .then(showResult)
        .catch(function () { showResult({ ok:false, message:"Could not reach the server." }); });
    }

    function showResult(res) {
      var sheet = document.getElementById("sheet");
      if (res.ok) {
        sheet.className = "sheet ok";
        document.getElementById("mark").textContent = "✓";
        document.getElementById("msg").textContent =
          res.name + " — clocked " + res.action + " at " + res.time;
      } else {
        sheet.className = "sheet err";
        document.getElementById("mark").textContent = "!";
        document.getElementById("msg").textContent = res.message || "Not allowed.";
      }
      document.getElementById("overlay").classList.add("show");
      setTimeout(function () {
        document.getElementById("overlay").classList.remove("show");
        loadWorkers();
      }, 2500);
    }

    loadWorkers();

    // Show the admin address (for your phone) and make the footer open admin
    // here in the app too — handy on any network / for testing.
    var footer = document.getElementById("footer");
    footer.style.cursor = "pointer";
    footer.onclick = function () { location.href = "/admin"; };
    fetch("/api/info")
      .then(function (r) { return r.json(); })
      .then(function (i) {
        footer.textContent = "Admin: http://" + i.ip + ":" + i.port + "/admin  ·  tap to open here";
      })
      .catch(function () { footer.textContent = "Tap to open Admin"; });
  </script>
</body>
</html>
