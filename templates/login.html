<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · TimeKeeper</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin">
  <div class="login-wrap">
    <form class="card login" method="post">
      <h1>Admin Access</h1>
      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, m in msgs %}<p class="flash {{ cat }}">{{ m }}</p>{% endfor %}
      {% endwith %}
      <input type="password" name="pin" inputmode="numeric" autocomplete="off"
             placeholder="Enter PIN" autofocus>
      <button type="submit" class="btn primary">Unlock</button>
    </form>
  </div>
</body>
</html>
